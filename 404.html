<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — CityTimeHub</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0B1120" />
  <style>
    :root { --brand:#2563EB; --accent:#38BDF8; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color:#eaf1ff; padding:24px;
      background: radial-gradient(120% 120% at 50% -10%, #16224a 0%, #0e1730 45%, #0b1120 100%);
    }
    .wrap { max-width:440px; }
    .code { font-size:clamp(4rem,16vw,7rem); font-weight:900; letter-spacing:-.04em;
      background:linear-gradient(100deg,var(--accent),#a78bfa); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
    h1 { font-size:1.4rem; margin:8px 0 10px; }
    p { color:#93a4c8; margin:0 0 24px; }
    a.btn { display:inline-block; font-weight:700; color:#fff; text-decoration:none;
      background:linear-gradient(135deg,var(--brand),var(--accent));
      padding:13px 22px; border-radius:12px; box-shadow:0 14px 30px -12px var(--brand); }
    a.btn:hover { filter:brightness(1.06); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This time zone doesn’t exist</h1>
    <p>The page you’re looking for has drifted off the map. Let’s get you back to world time.</p>
    <a class="btn" href="/">Back to CityTimeHub</a>
  </div>
</body>
</html>
